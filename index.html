<body>

<canvas id="galaxy"></canvas>

Developer

loading age...

<script>

const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i = 0; i < 1200; i++){

stars.push({
x:(Math.random()-0.5)*canvas.width,
y:(Math.random()-0.5)*canvas.height,
z:Math.random()*canvas.width
});

}

function animate(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let i=0;i<stars.length;i++){

let star=stars[i];

star.z -= 2;

if(star.z <= 0){
star.z = canvas.width;
}

let k = 128.0 / star.z;

let px = star.x * k + canvas.width/2;
let py = star.y * k + canvas.height/2;

if(px>=0 && px<=canvas.width && py>=0 && py<=canvas.height){

let size = (1 - star.z/canvas.width) * 3;

ctx.fillStyle="white";
ctx.fillRect(px,py,size,size);

}

}

requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize",()=>{

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

});

</script>

<script>

const birthDate = new Date("2008-01-21T03:33:44");

function updateAge(){

const now = new Date();

const diff = now - birthDate;

const years = diff / (1000 * 60 * 60 * 24 * 365.2425);

document.getElementById("age").textContent =
"Age: " + years.toFixed(10) + " years";

}

setInterval(updateAge,1000);

updateAge();

</script>
